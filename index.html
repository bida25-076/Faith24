 <main>

  <section class="movies-section">
 
  <h2>Now Showing</h2>
 
  <!-- Buttons -->
  <div class="movie-buttons">
    <button onclick="filterMovies('all')">All</button>
    <button onclick="filterMovies('showing')">Now Showing</button>
    <button onclick="filterMovies('coming')">Coming Soon</button>
  </div>
 
  <!-- Movies Container -->
  <div class="movies-container">
 
    <div class="movie-card showing">
      <img src="images/sanandres.jpg" alt="San Andres">
      <h3>San Andres 2</h3>
      <button>More Info</button>
    </div>
 
    <div class="movie-card showing">
      <img src="images/thunderbolts.jpg" alt="Thunderbolts">
      <h3>Thunderbolts</h3>
      <button>More Info</button>
    </div>
 
    <div class="movie-card coming">
      <img src="images/movie3.jpg" alt="Movie">
      <h3>Coming Movie</h3>
      <button>More Info</button>
    </div>
 
  </div>
 
</section>

  <!-- Bootstrap JS and dependencies -->

<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.6/dist/umd/popper.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.min.js"></script>
 
<script>
function filterMovies(category) {
  let movies = document.querySelectorAll('.movie-card');
 
  movies.forEach(movie => {
    if (category === 'all') {
      movie.style.display = 'block';
    } else if (movie.classList.contains(category)) {
      movie.style.display = 'block';
    } else {
      movie.style.display = 'none';
    }
  });
}
</script>
